<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 256" width="900" height="256" role="img" aria-label="Ambatukam Go">
  <title>Ambatukam Go</title>
  <desc>Composable, idiomatic Go HTTP resilience</desc>

  <defs>
