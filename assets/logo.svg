<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Ambatukam Go">
  <title>Ambatukam Go</title>
  <desc>Composable, idiomatic Go HTTP resilience</desc>

  <defs>
    <!-- Mark: hexagon + retry arrows + A, designed at 256x256 then scaled -->
    <symbol id="mark" viewBox="0 0 256 256">
      <polygon points="28,128 78,46 178,46 228,128 178,210 78,210"
               fill="#00ADD8" stroke="#007D9A" stroke-width="4" stroke-linejoin="round"/>
      <path d="M 128 96 L 107 158 L 121 158 L 125.5 145 L 130.5 145 L 134.5 158 L 149 158 Z M 128 116 L 132 130 L 124 130 Z"
            fill="#FFFFFF" fill-rule="evenodd"/>
      <g fill="none" stroke="#FF6B35" stroke-width="7" stroke-linecap="butt">
        <path d="M 159.8 96.2 A 45 45 0 0 1 159.8 159.8" marker-end="url(#arrowhead)"/>
        <path d="M 159.8 96.2 A 45 45 0 0 1 159.8 159.8" marker-end="url(#arrowhead)" transform="rotate(120 128 128)"/>
        <path d="M 159.8 96.2 A 45 45 0 0 1 159.8 159.8" marker-end="url(#arrowhead)" transform="rotate(240 128 128)"/>
      </g>
    </symbol>
    <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 14 7 L 0 14 L 3.5 7 Z" fill="#FF6B35"/>
    </marker>
  </defs>

  <!-- Mark: ~320px wide, centered horizontally, near the top -->
  <use href="#mark" x="96" y="32" width="320" height="320"/>

  <!-- Wordmark: AMBATUKAM -->
  <text x="256" y="408"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="56"
        letter-spacing="2"
        text-anchor="middle"
        fill="#1A1A2E">AMBATUKAM</text>

  <!-- "go" suffix, smaller, lower baseline, blue -->
  <text x="256" y="456"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="28"
        letter-spacing="1"
        text-anchor="middle"
        fill="#00ADD8">go</text>
</svg>
